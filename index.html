<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Intel | Scanner IP Chile</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="py-4">

    <div class="container">
        <!-- Encabezado -->
        <header class="text-center mb-5">
            <h1 class="display-3 fw-bold shadow-text">CYBER-INTEL</h1>
            <p class="lead text-uppercase">Scanner de Red & Localizador de Webcams (Chile)</p>
            <div class="border-top border-danger w-25 mx-auto opacity-50"></div>
        </header>

        <!-- Panel de Control -->
        <div class="card bg-dark border-danger mb-4 shadow-lg">
            <div class="card-body p-4">
                <div class="row g-3">
                    <div class="col-md-7">
                        <label class="form-label small fw-bold text-danger">DORK / BÚSQUEDA</label>
                        <input type="text" id="searchQuery" class="form-control custom-input" placeholder="webcam cl" value="webcam cl">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-danger">PUERTO</label>
                        <input type="text" id="targetPort" class="form-control custom-input" placeholder="Ej: 80, 8080 (Vacío = Todos)">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button onclick="ejecutarBusqueda()" class="btn btn-danger w-100 fw-bold">ESCANEAR</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Terminal de Salida -->
        <div class="terminal-window shadow-lg">
            <div class="d-flex align-items-center mb-3">
                <span class="dot bg-danger"></span>
                <span class="dot bg-warning"></span>
                <span class="dot bg-success"></span>
                <span class="ms-2 small opacity-75">root@cyberintel_scanner:~/chile_audit</span>
            </div>
            <div id="consoleOutput">
                <p class="text-secondary opacity-50">[Módulo de cámaras cargado con éxito...]</p>
                <p class="text-secondary opacity-50">[Listo para auditar IPs en Chile...]</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
