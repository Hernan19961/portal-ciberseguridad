<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Intel | Scanner Avanzado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="py-4">
    <div class="container">
        <header class="text-center mb-5">
            <h1 class="display-3 fw-bold shadow-text">CYBER-INTEL</h1>
            <p class="lead text-uppercase">Inteligencia de Redes: Shodan & ZoomEye</p>
            <div class="border-top border-danger w-25 mx-auto opacity-50"></div>
        </header>

        <div class="card bg-dark border-danger mb-4 shadow-lg">
            <div class="card-body p-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-danger">DORK DE BÚSQUEDA O IP EXACTA</label>
                        <input type="text" id="searchQuery" class="form-control custom-input" placeholder="Ej: webcam cl o 8.8.8.8" value="webcam cl">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-danger">MOTOR DE BÚSQUEDA</label>
                        <select id="engineSelect" class="form-select custom-input">
                            <option value="shodan">SHODAN ENGINE</option>
                            <option value="zoomeye">ZOOMEYE ENGINE</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button onclick="ejecutarBusqueda()" class="btn btn-danger w-100 fw-bold">ESCANEAR</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="terminal-window shadow-lg">
            <div id="consoleOutput">
                <p class="text-secondary opacity-50">[Listo para auditoría. Motor anti-bloqueos y caché activado...]</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
