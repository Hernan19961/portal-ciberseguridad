<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Intel | H. Olave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="text-center mb-3">
                    <h2 class="cyber-title">CYBER-INTEL V4.0</h2>
                    <div class="status-bar">MODO: ALERTA ROJA | OPERADOR: H. OLAVE</div>
                </div>

                <div class="card terminal-card p-3 mb-3">
                    <div class="input-group">
                        <input type="text" id="commandInput" class="form-control input-cyber" placeholder="IP o comando (ej: webcam cl)">
                        <button class="btn btn-danger" id="runBtn">EJECUTAR</button>
                    </div>
                </div>

                <div id="console" class="console-output">
                    <div class="text-danger">> Sistema listo. Ingrese comando de red...</div>
                </div>

                <div class="footer-credits text-center mt-4">
                    <p>© Todos los derechos reservados Hernán Olave 2026</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
