<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPortal | Mini Shodan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-4">🛡️ Portal de Ciberseguridad</h1>
            <p class="text-secondary text-uppercase">Hernán 1996 - Monitoring System</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card p-4 shadow-lg">
                    <h3>Explorador de Host</h3>
                    <p class="text-muted">Introduce una IP para analizar servicios y puertos activos.</p>
                    
                    <div class="input-group mb-3">
                        <input type="text" id="ipInput" class="form-control bg-dark text-white border-secondary" placeholder="Ej: 8.8.8.8">
                        <button class="btn btn-cyber" type="button" id="scanBtn">EJECUTAR ESCANEO</button>
                    </div>

                    <div id="results" class="results-container mt-3 p-3 rounded bg-black">
                        <span class="text-secondary terminal-text">> Sistema listo. Esperando dirección IP...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
