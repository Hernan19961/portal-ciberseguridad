<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CyberTerminal v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="text-center mb-4">
                    <h1 class="text-primary">CORE SEARCH ENGINE</h1>
                    <p class="text-muted small">OPERATOR: HERNAN_1996 | CACHE: ENABLED</p>
                </div>

                <div class="card p-4 mb-4 border-primary bg-dark">
                    <div class="input-group">
                        <input type="text" id="mainInput" class="form-control bg-black text-white border-primary" 
                               placeholder="IP (ej: 8.8.8.8) o Comando (ej: webcam cl)">
                        <button class="btn btn-primary" id="execBtn">EJECUTAR</button>
                    </div>
                    <div class="mt-2 text-secondary" style="font-size: 0.75rem;">
                        Sugerencias: <code>webcam cl</code> | <code>linux cl</code> | <code>port:8080 cl</code> | <code>dahua</code>
                    </div>
                </div>

                <div id="results" class="console-box p-3 rounded">
                    <div class="text-muted">> Consola esperando órdenes...</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
